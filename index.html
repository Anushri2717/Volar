<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Airline Reservation</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="container">
  <h1>Volar</h1>

  <div id="dashboard" class="dashboard">
    <div>Flight: <span id="dashFlight">-</span></div>
    <div>Date: <span id="dashDate">-</span></div>
    <div>Passengers Booked: <span id="dashCount">0</span></div>
  </div>

  
  <form id="reservationForm">
    <label for="passenger">Passenger Name:</label>
    <input type="text" id="passenger" placeholder="Enter your name" required>

    <label for="gender">Gender:</label>
    <select id="gender" required>
      <option value="">Select Gender</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
      <option value="Other">Other</option>
    </select>

    <label for="flight">Select Flight:</label>
    <select id="flight" required>
      <option value="">--Choose a flight--</option>
      <option value="India -> Paris">India -> Paris</option>
      <option value="Paris -> Tokyo">Paris -> Tokyo</option>
      <option value="London -> New York">London -> New York</option>
      <option value="Dubai -> India">Dubai -> India</option>
      <option value="India -> Dubai">Inida -> Dubai</option>
    </select>

    <label for="airline">Airline:</label>
    <select id="airline" required>
      <option value="">Select Airline</option>
      <option value="Air France">Air France</option>
      <option value="British Airways">British Airways</option>
      <option value="Emirates">Emirates</option>
    </select>

    <label for="class">Select Class:</label>
    <select id="class" required>
      <option value="">Select Class</option>
      <option value="Economy">Economy</option>
      <option value="Business">Business</option>
      <option value="First">First</option>
    </select>

    <label for="time">Flight Time:</label>
    <select id="time" required>
      <option value="">Select Time</option>
      <option value="06:00 AM">06:00 AM</option>
      <option value="12:00 PM">12:00 PM</option>
      <option value="06:00 PM">06:00 PM</option>
    </select>

    <label for="date">Select Date:</label>
    <input type="date" id="date" required>

    <label for="govIdType">Government ID Type:</label>
    <select id="govIdType" required>
      <option value="">Select ID Type</option>
      <option value="Passport">Passport</option>
      <option value="Aadhar">Aadhar</option>
      <option value="Driving License">Driving License</option>
      <option value="Other">Other</option>
    </select>
    <label for="govIdNumber">Government ID Number:</label>
    <input type="text" id="govIdNumber" placeholder="Enter ID Number" required>

    
    <div class="legend">
      <div><div class="seat available"></div> Available</div>
      <div><div class="seat booked"></div> Booked</div>
      <div><div class="seat selected"></div> Selected</div>
    </div>

    <label for="seat">Select Seat:</label>
    <div id="seatMap" class="seat-map"></div>

    <button type="submit">Book Flight</button>
  </form>

  
  <h2>Booked Flights</h2>
  <ul id="reservationList"></ul>

  <div id="summaryControls" style="text-align:right; margin-bottom:10px;">
    <button id="clearBookings" class="clear-btn">Clear All Bookings</button>
  </div>
  <h2>Flights Summary</h2>
  <div id="summary" class="summary"></div>
</div>


<div id="toast"></div>


<div id="ticketModal" class="modal" style="display:none;">
  <div class="modal-content">
    <iframe id="ticketPreview" style="width:100%; height:520px; border:0;"></iframe>
    <div class="modal-actions" style="text-align:right; margin-top:10px;">
      <button id="downloadTicketBtn" class="download-btn">Download Ticket</button>
      <button id="closeTicketBtn" class="clear-btn">Close</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="script.js"></script>
</body>
</html>
